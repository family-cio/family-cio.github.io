name: Build and deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push to gh-pages branch

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Inject secrets into index.html
        env:
          GITHUB_TOKEN_VALUE: ${{ secrets.UPLOAD_TOKEN }}
          GITHUB_OWNER_VALUE: ${{ secrets.UPLOAD_OWNER }}
          GITHUB_REPO_VALUE:  ${{ secrets.UPLOAD_REPO }}
        run: |
          sed -i "s|%%GITHUB_TOKEN%%|${GITHUB_TOKEN_VALUE}|g" index.html
          sed -i "s|%%GITHUB_OWNER%%|${GITHUB_OWNER_VALUE}|g" index.html
          sed -i "s|%%GITHUB_REPO%%|${GITHUB_REPO_VALUE}|g"   index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          exclude_assets: '.github'
